<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdminBot | Asistencia</title>
    <link rel="stylesheet" href="../../shared/css/layout.css" />
    <style>
      .attendance-controls {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
        align-items: flex-end;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      input[type="date"] {
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        color: white;
        padding: 10px;
        border-radius: 8px;
      }
      .attendance-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }
      .student-check {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .toggle-status {
        width: 40px;
        height: 20px;
        background: var(--border-color);
        border-radius: 10px;
        position: relative;
        cursor: pointer;
      }
      .toggle-status.active {
        background: var(--success-color);
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo-icon"></div>
          <h2>AdminBot</h2>
        </div>
        <nav class="sidebar-nav">
          <a href="../dashboard/index.html" class="nav-item"
            ><span>🏠</span> Dashboard</a
          >
          <a href="../students/index.html" class="nav-item"
            ><span>👥</span> Estudiantes</a
          >
          <a href="../attendance/index.html" class="nav-item active"
            ><span>📅</span> Asistencia</a
          >
          <a href="../payments/index.html" class="nav-item"
            ><span>💰</span> Pagos</a
          >
          <a href="../alerts/index.html" class="nav-item"
            ><span>🔔</span> Alertas</a
          >
          <a href="../settings/index.html" class="nav-item"
            ><span>⚙️</span> Configuración</a
          >
        </nav>
      </aside>
      <div class="main-layout">
        <header class="top-header"><h1>Registro de Asistencia</h1></header>
        <main class="content-body">
          <div class="card">
            <div class="attendance-controls">
              <div class="form-group">
                <label>Fecha:</label>
                <input type="date" value="2024-04-22" />
              </div>
              <div class="form-group">
                <label>Grado:</label>
                <select class="btn btn-outline">
                  <option>Todos</option>
                  <option>5º Grado</option>
                </select>
              </div>
              <button class="btn btn-primary">Guardar Registro</button>
            </div>
            <div class="attendance-grid">
              <div class="card student-check">
                <span>Juan Pérez</span>
                <div class="toggle-status active"></div>
              </div>
              <div class="card student-check">
                <span>Ana García</span>
                <div class="toggle-status active"></div>
              </div>
              <div class="card student-check">
                <span>Luis Mora</span>
                <div class="toggle-status"></div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
